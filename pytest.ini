[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --alluredir=reports/allure-results
    --clean-alluredir
markers =
    smoke: 冒烟测试
    inbound: 入库相关测试
    outbound: 出库相关测试
    e2e: 端到端流程测试
    slow: 耗时较长的测试
